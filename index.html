<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden Monitor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 1.4rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #4caf50;
            margin-bottom: 8px;
        }

        header p {
            font-size: 0.75rem;
            color: #555;
            letter-spacing: 0.15em;
        }

        /* ── Latest reading strip ── */
        .latest {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            max-width: 900px;
            margin: 0 auto 40px;
        }

        .latest-card {
            background: #111;
            border: 1px solid #222;
            border-left: 3px solid #4caf50;
            border-radius: 4px;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .latest-card .label {
            font-size: 0.6rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #555;
        }

        .latest-card .value {
            font-size: 2.4rem;
            font-weight: bold;
            color: #4caf50;
            line-height: 1;
        }

        .latest-card .unit {
            font-size: 0.9rem;
            color: #555;
            margin-left: 3px;
        }

        .latest-card .ts {
            font-size: 0.6rem;
            color: #333;
            letter-spacing: 0.08em;
        }

        /* ── Charts ── */
        .charts {
            display: flex;
            flex-direction: column;
            gap: 24px;
            max-width: 900px;
            margin: 0 auto;
        }

        .chart-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 4px;
            padding: 24px;
        }

        .chart-card .chart-title {
            font-size: 0.65rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #555;
            margin-bottom: 16px;
        }

        .chart-card canvas {
            width: 100% !important;
        }

        /* ── Footer status ── */
        .status {
            text-align: center;
            margin-top: 40px;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            color: #333;
        }

        .status.live  { color: #4caf50; }
        .status.error { color: #c62828; }
    </style>
</head>
<body>

<header>
    <h1>Garden Monitor</h1>
    <p>Pensacola, FL &mdash; Live Sensor Feed</p>
</header>

<!-- Latest reading -->
<div class="latest">
    <div class="latest-card">
        <div class="label">Temperature</div>
        <div class="value" id="val-temp">--<span class="unit">&deg;F</span></div>
        <div class="ts" id="ts-temp">waiting...</div>
    </div>
    <div class="latest-card">
        <div class="label">Humidity</div>
        <div class="value" id="val-hum">--<span class="unit">%</span></div>
        <div class="ts" id="ts-hum">waiting...</div>
    </div>
    <div class="latest-card">
        <div class="label">Soil Moisture</div>
        <div class="value" id="val-soil">--<span class="unit">raw</span></div>
        <div class="ts" id="ts-soil">waiting...</div>
    </div>
</div>

<!-- Graphs -->
<div class="charts">
    <div class="chart-card">
        <div class="chart-title">Temperature &mdash; last 60 readings</div>
        <canvas id="chart-temp" height="120"></canvas>
    </div>
    <div class="chart-card">
        <div class="chart-title">Humidity &mdash; last 60 readings</div>
        <canvas id="chart-hum" height="120"></canvas>
    </div>
    <div class="chart-card">
        <div class="chart-title">Soil Moisture &mdash; last 60 readings</div>
        <canvas id="chart-soil" height="120"></canvas>
    </div>
</div>

<div class="status" id="status">CONNECTING...</div>

<script>
    const SUPABASE_URL = 'https://ntmgyygbsdqumahniekx.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_CbdThUIEfiKJe_Cg745u-Q_Hf7iIJxl';
    const REFRESH_MS   = 60000; // match the ESP32 publish interval

    const chartDefaults = {
        type: 'line',
        options: {
            animation: false,
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                x: {
                    ticks: { color: '#444', font: { size: 10 }, maxTicksLimit: 8 },
                    grid:  { color: '#1a1a1a' }
                },
                y: {
                    ticks: { color: '#444', font: { size: 10 } },
                    grid:  { color: '#1a1a1a' }
                }
            }
        }
    };

    function makeChart(id, label, color) {
        return new Chart(document.getElementById(id), {
            ...chartDefaults,
            data: {
                labels: [],
                datasets: [{
                    label,
                    data: [],
                    borderColor: color,
                    backgroundColor: color + '18',
                    borderWidth: 1.5,
                    pointRadius: 2,
                    tension: 0.3,
                    fill: true
                }]
            }
        });
    }

    const charts = {
        temp: makeChart('chart-temp', 'Temperature (°F)', '#4caf50'),
        hum:  makeChart('chart-hum',  'Humidity (%)',     '#2196f3'),
        soil: makeChart('chart-soil', 'Soil (raw)',       '#ff9800')
    };

    function timeAgo(dateStr) {
        const s = Math.floor((new Date() - new Date(dateStr)) / 1000);
        if (s < 60)   return `${s}s ago`;
        if (s < 3600) return `${Math.floor(s / 60)}m ago`;
        return `${Math.floor(s / 3600)}h ago`;
    }

    function fmtTime(dateStr) {
        const d = new Date(dateStr);
        return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function updateChart(chart, labels, values) {
        chart.data.labels   = labels;
        chart.data.datasets[0].data = values;
        chart.update();
    }

    async function refresh() {
        try {
            const res = await fetch(
                `${SUPABASE_URL}/rest/v1/sensor_readings?order=created_at.desc&limit=60`,
                {
                    headers: {
                        'apikey':        SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                }
            );

            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const rows = await res.json();
            if (!rows.length) throw new Error('No data yet');

            // Latest reading (rows[0] = most recent)
            const latest = rows[0];
            const ago    = timeAgo(latest.created_at);

            document.getElementById('val-temp').innerHTML  =
                `${parseFloat(latest.temperature).toFixed(1)}<span class="unit">&deg;F</span>`;
            document.getElementById('val-hum').innerHTML   =
                `${parseFloat(latest.humidity).toFixed(1)}<span class="unit">%</span>`;
            document.getElementById('val-soil').innerHTML  =
                `${parseInt(latest.soil_moisture)}<span class="unit">raw</span>`;
            ['temp','hum','soil'].forEach(id =>
                document.getElementById(`ts-${id}`).textContent = ago
            );

            // Graphs — reverse so oldest is left
            const sorted = [...rows].reverse();
            const labels = sorted.map(r => fmtTime(r.created_at));
            updateChart(charts.temp, labels, sorted.map(r => parseFloat(r.temperature)));
            updateChart(charts.hum,  labels, sorted.map(r => parseFloat(r.humidity)));
            updateChart(charts.soil, labels, sorted.map(r => parseInt(r.soil_moisture)));

            const el = document.getElementById('status');
            el.textContent = `LIVE — updated ${ago} — refreshes every 60s`;
            el.className = 'status live';

        } catch (err) {
            console.error(err);
            const el = document.getElementById('status');
            el.textContent = `ERROR: ${err.message}`;
            el.className = 'status error';
        }
    }

    refresh();
    setInterval(refresh, REFRESH_MS);
</script>

</body>
</html>
